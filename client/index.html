<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SG Recipe Book</title>
    
    <!-- Default Open Graph meta tags (will be overridden by react-helmet for recipe pages) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SG Recipe Book" />
    <meta property="og:title" content="SG Recipe Book — Preserve Singapore's Home Recipes" />
    <meta property="og:description" content="Help preserve Singapore's home recipes before they're lost. Share your mum's, grandma's, or auntie's recipes with the next generation." />
    <meta property="og:image" content="https://sgrecipebook.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:url" content="https://sgrecipebook.com" />
    
    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SG Recipe Book — Preserve Singapore's Home Recipes" />
    <meta name="twitter:description" content="Help preserve Singapore's home recipes before they're lost. Share your mum's, grandma's, or auntie's recipes with the next generation." />
    <meta name="twitter:image" content="https://sgrecipebook.com/og-image.jpg" />
    
    <!-- Google Fonts - Libre Baskerville for editorial feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
